<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h2>Tender PDF Extractor</h2>
        <hr>
        <p class="info-text">1. Scrape a PDF open in your current tab:</p>
        <button id="extractBtn">EXTRACT CURRENT TAB</button>

        <div class="divider"><span>OR</span></div>

        <p class="info-text">2. Manually process any local document:</p>
        <input type="file" id="fileInput" accept=".pdf">

        <div id="status" class="status-msg"></div>
    </div>
    <script type="module" src="popup.js"></script>
</body>

</html>
